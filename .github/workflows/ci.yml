name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install lua-language-server
        if: runner.os == 'Linux'
        run: |
          mkdir -p /tmp/luals
          curl -sL https://github.com/LuaLS/lua-language-server/releases/download/3.9.1/lua-language-server-3.9.1-linux-x64.tar.gz | tar -xz -C /tmp/luals
          echo "/tmp/luals/bin" >> $GITHUB_PATH

      - name: Check formatting (stylua)
        if: runner.os == 'Linux'
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: make test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Use the same command as make test but directly in bash
          nvim --clean -u NONE --cmd "set rtp+=. | set rtp+=./lua" -l tests/run_all.lua

      - name: Type check (lua-language-server)
        if: runner.os == 'Linux'
        run: make check
