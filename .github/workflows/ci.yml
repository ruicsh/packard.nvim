name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install lua-language-server
        run: |
          mkdir -p /tmp/luals
          curl -sL https://github.com/LuaLS/lua-language-server/releases/download/3.9.1/lua-language-server-3.9.1-linux-x64.tar.gz | tar -xz -C /tmp/luals
          echo "/tmp/luals/bin" >> $GITHUB_PATH

      - name: Check formatting (stylua)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

      - name: Run tests
        run: make test

      - name: Type check (lua-language-server)
        run: make check
